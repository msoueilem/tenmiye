# Full self-hosted stack: MongoDB (single-node replica set) + NestJS backend +
# Next.js frontend, behind an nginx gateway on a single public port.
#
# Config:
#   .env               -> PUBLIC_URL and GATEWAY_PORT (compose interpolation)
#   deploy/backend.env -> backend secrets (JWT, Firebase, Google) — gitignored
#
# Bring up:  docker compose up -d --build
# Seed:      docker compose run --rm backend node scripts/seed.mjs

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2g
        reservations:
          memory: 512m
    command: ['--replSet', 'rs0', '--bind_ip_all', '--wiredTigerCacheSizeGB', '1']
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # Initiates the single-node replica set on first boot, then reports healthy.
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '--eval',
          "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }",
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
    env_file:
      - ./deploy/backend.env
    environment:
      PORT: '8080'
      MONGODB_URI: mongodb://mongo:27017/tenmiye?replicaSet=rs0
      UPLOADS_DIR: /data/uploads
      UPLOADS_PUBLIC_BASE_URL: ${PUBLIC_URL}
      FRONTEND_URL: ${PUBLIC_URL}
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512m
    environment:
      # Server-side rendering talks to the backend over the internal network.
      API_INTERNAL_URL: http://backend:8080/api
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m
    ports:
      - '${GATEWAY_PORT}:80'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data:
  uploads-data:
