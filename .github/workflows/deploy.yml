# Deploy: on every push to main, SSH to the VPS, pull main, rebuild and restart
# the docker-compose stack under /opt/tenmiye. Images are built on the VPS.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" button

# Never let two deploys race.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          port: ${{ vars.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          envs: DEPLOY_PATH,PUBLIC_URL,GATEWAY_PORT,JWT_SECRET,FIREBASE_PROJECT_ID,FIREBASE_CLIENT_EMAIL,FIREBASE_PRIVATE_KEY,FIREBASE_WEB_API_KEY,FIREBASE_STORAGE_BUCKET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,SEED_ADMIN_EMAIL
          script: |
            set -e
            cd "$DEPLOY_PATH"

            echo "==> Sync main"
            git fetch origin main
            git checkout main 2>/dev/null || git checkout -b main origin/main
            git reset --hard origin/main

            echo "==> Write compose env (.env)"
            umask 077
            cat > .env <<EOF
            PUBLIC_URL=${PUBLIC_URL}
            GATEWAY_PORT=${GATEWAY_PORT}
            EOF

            echo "==> Write backend env (deploy/backend.env)"
            cat > deploy/backend.env <<EOF
            JWT_SECRET=${JWT_SECRET}
            FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
            FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
            FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
            FIREBASE_WEB_API_KEY=${FIREBASE_WEB_API_KEY}
            FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
            SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
            EOF

            echo "==> Build & start"
            docker compose up -d --build
            docker image prune -f

            echo "==> Health check"
            for i in $(seq 1 30); do
              if curl -fsS "http://localhost:${GATEWAY_PORT}/api/health" | grep -q '"status":"ok"'; then
                echo "Deploy healthy"; exit 0
              fi
              sleep 3
            done
            echo "Health check failed"; docker compose ps; docker compose logs backend --tail 40; exit 1
        env:
          DEPLOY_PATH: ${{ vars.VPS_PATH }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
          GATEWAY_PORT: ${{ vars.GATEWAY_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
          SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
